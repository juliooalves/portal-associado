services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-associado-db
    environment:
      POSTGRES_DB: portal_associado
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal_associado"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
