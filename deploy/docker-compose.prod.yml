services:
  app:
    image: ghcr.io/juliooalves/portal-associado:latest
    container_name: portal-associado-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=portal_associado;Username=portal;Password=${POSTGRES_PASSWORD}
      Database__MigrateOnStartup: "true"
      Database__SeedOnStartup: "true"

  postgres:
    image: postgres:16-alpine
    container_name: portal-associado-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_associado
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal_associado"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: portal-associado-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
